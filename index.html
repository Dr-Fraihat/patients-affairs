<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>داشبورد شؤون المرضى والاستقبال</title>
  <style>
    :root{--primary:#1f3c88;--primary2:#2d52b5;--card:#ffffff;--text:#1d2a44;--muted:#6b7893;--border:#d9e2f1;--success:#16a34a;--warning:#d97706;--danger:#dc2626;--neutral:#64748b;--shadow:0 10px 24px rgba(18,43,105,.08);--radius:20px;}
    *{box-sizing:border-box} body{margin:0;font-family:"Segoe UI",Tahoma,Arial,sans-serif;color:var(--text);background:linear-gradient(180deg,#f8faff 0%, #eef3fb 100%)} a{text-decoration:none;color:inherit}
    .hero{background:linear-gradient(135deg,var(--primary) 0%,var(--primary2) 100%);color:#fff;padding:28px 24px;box-shadow:var(--shadow)} .hero-inner,.page-wrap{max-width:1450px;margin:0 auto}
    .hero h1{margin:0 0 8px;font-size:28px;line-height:1.35} .hero p{margin:0;color:rgba(255,255,255,.92);font-size:15px} .page-wrap{padding:22px}
    .section-title{margin:0 0 6px;font-size:28px;color:var(--primary)} .section-subtitle{margin:0 0 18px;color:var(--muted);font-size:14px}
    .grid{display:grid;gap:18px} .stats-grid{grid-template-columns:repeat(auto-fit,minmax(220px,1fr));margin-bottom:22px} .cards-grid{grid-template-columns:repeat(auto-fit,minmax(250px,1fr));margin-bottom:22px} .two-col{grid-template-columns:1.2fr .95fr;align-items:start}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}
    .stat-card{min-height:118px;display:flex;flex-direction:column;justify-content:center;gap:8px} .stat-title{font-size:14px;color:var(--muted)} .stat-value{font-size:34px;font-weight:800;color:var(--primary)}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center} .btn,button{border:none;background:var(--primary);color:#fff;padding:11px 16px;border-radius:14px;cursor:pointer;font-size:14px;transition:.18s ease}
    .btn:hover,button:hover{transform:translateY(-1px);background:var(--primary2)} .btn.secondary{background:#edf2ff;color:var(--primary);border:1px solid #cdd8f6} .btn.danger{background:var(--danger)}
    .employee-card h3{margin:0 0 8px;font-size:18px;line-height:1.5} .employee-card .role{color:var(--primary);font-weight:800;min-height:48px;margin-bottom:14px}
    .pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px} .pill{padding:8px 12px;border-radius:999px;font-size:13px;font-weight:800;border:1px solid;background:#fff}
    .pill.total{color:#2347a4;background:#eef3ff;border-color:#c9d6ff} .pill.done{color:var(--success);background:#ecfdf3;border-color:#bbf7d0} .pill.progress{color:var(--warning);background:#fff7ed;border-color:#fed7aa} .pill.late{color:var(--danger);background:#fef2f2;border-color:#fecaca} .pill.new{color:var(--neutral);background:#f8fafc;border-color:#cbd5e1}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px} .full-span{grid-column:1/-1} label{display:block;margin-bottom:8px;font-weight:800;color:#334155}
    input,select,textarea{width:100%;padding:14px 15px;border-radius:14px;border:1px solid #cfd8ea;background:#fff;font-size:15px;outline:none} input:focus,select:focus,textarea:focus{border-color:#7fa1ff;box-shadow:0 0 0 4px rgba(66,99,235,.08)} textarea{min-height:110px;resize:vertical}
    .employee-header{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:18px} .employee-header h2{margin:0 0 6px;color:var(--primary);font-size:30px} .employee-header p{margin:0;color:var(--muted)}
    .task-list{display:flex;flex-direction:column;gap:14px;margin-top:16px} .task-item{border:1px solid var(--border);border-radius:18px;background:#fff;overflow:hidden} .task-head{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:16px 18px 10px;flex-wrap:wrap} .task-title{font-weight:800;font-size:17px;line-height:1.7} .task-body{padding:0 18px 18px}
    .task-fields{display:grid;grid-template-columns:160px 170px 1fr;gap:12px;margin-top:14px} .status-badge{display:inline-flex;align-items:center;justify-content:center;min-width:98px;padding:8px 12px;border-radius:999px;font-size:13px;font-weight:800;border:1px solid}
    .status-new{color:var(--neutral);background:#f8fafc;border-color:#cbd5e1} .status-progress{color:var(--warning);background:#fff7ed;border-color:#fed7aa} .status-done{color:var(--success);background:#ecfdf3;border-color:#bbf7d0} .status-late{color:var(--danger);background:#fef2f2;border-color:#fecaca}
    .task-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px} .muted-box{background:#f8fbff;border:1px dashed #b9c8e5;border-radius:16px;padding:16px;color:#56647f;line-height:1.9} .small-note,.footer-note{color:var(--muted);font-size:13px}
    .top-actions{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px} .empty-state{padding:25px;text-align:center;color:var(--muted)}
    @media (max-width:1050px){.two-col{grid-template-columns:1fr}} @media (max-width:820px){.task-fields,.form-grid{grid-template-columns:1fr}.hero h1{font-size:24px}.employee-header h2{font-size:24px}}
  </style>
</head>
<body>
  <div class="hero"><div class="hero-inner"><h1 id="heroTitle">داشبورد شؤون المرضى والاستقبال</h1><p id="heroSubtitle">مركز التوحد - متابعة الإنجاز اليومي للفريق والمؤشرات التشغيلية</p></div></div>
  <div class="page-wrap" id="app"></div>
  <script>
    const roleTasks = {
      "المنسق العام لشؤون المرضى والاستقبال": ["الإشراف على سير العمل اليومي في شؤون المرضى والاستقبال","متابعة التزام الموظفين بجداول العمل والمهام","متابعة جداول العيادات والتأكد من انتظامها","حل المشكلات التشغيلية المتعلقة بالمواعيد أو المرضى","التنسيق مع الأطباء والأخصائيين في حال وجود أي تعديل على الجداول","متابعة الحالات الخاصة أو العاجلة","متابعة شكاوى المرضى وأولياء الأمور والعمل على حلها","متابعة نسب حضور المرضى للعيادات","الإشراف على تنظيم قائمة الانتظار","دعم الفريق عند ضغط العمل أو ازدحام المراجعين","مراجعة جدول العيادات للأسبوع القادم","مراجعة أداء فريق شؤون المرضى","متابعة أي ملاحظات من الأطباء أو الأخصائيين","مراجعة قائمة الانتظار وتحديد الأولويات","متابعة حالات عدم الحضور المتكررة","مراجعة إحصائيات العيادات","إعداد تقرير بعدد المراجعين","إعداد تقرير بنسبة عدم الحضور","رفع التقارير للإدارة عند الطلب","تقييم سير العمل واقتراح تحسينات تشغيلية","التنسيق مع إدارة شؤون المرضى","التنسيق مع إدارة الحالة","التنسيق مع إدارة تقنية المعلومات في حال وجود مشاكل بالنظام","متابعة الشكاوى التي تتطلب تصعيد إداري","دعم العيادات في حال وجود ضغط كبير في المراجعين"],
      "منسق شؤون مرضى": ["حجز المواعيد الجديدة للمرضى","تعديل المواعيد عند طلب المراجع أو الأخصائي","إلغاء المواعيد عند الحاجة","إعادة جدولة المواعيد الملغاة","متابعة جدول المواعيد اليومي للعيادات","متابعة التحويلات الواردة للمركز","حجز المواعيد للمرضى المحولين","تسجيل المرضى الجدد في قاعدة البيانات","تحديث بيانات المرضى في النظام","متابعة أوامر العلاج الواردة للمركز","حجز مواعيد التقييم والتشخيص","حجز مواعيد جلسات العلاج المختلفة","متابعة المرضى الذين لم يحضروا مواعيدهم","الاتصال بالمرضى لمعرفة سبب عدم الحضور","تسجيل أسباب عدم الحضور في السجل","تحديث قائمة الانتظار","الاتصال بالمرضى في قائمة الانتظار عند توفر مواعيد","التنسيق مع الأخصائيين حول المواعيد القادمة","إعداد جدول العيادات للأسبوع القادم","مراجعة المواعيد التي تحتاج تعديل أو إعادة جدولة","إعداد إحصائية العيادات الشهرية","إعداد إحصائية العيادات الافتراضية","إعداد تقرير بعدد المرضى الجدد","إعداد تقرير بنسبة عدم الحضور","رفع الإحصائيات للمنسق العام","التنسيق لحجز مواعيد مشتركة بين أكثر من تخصص","التنسيق مع إدارة شؤون المرضى بخصوص التحويلات","متابعة طلبات التقارير الطبية للمرضى","متابعة طلبات تعديل المواعيد الخاصة بالحالات الطارئة","دعم موظف الاستقبال عند ازدحام المراجعين"],
      "موظف استقبال": ["استقبال المرضى وأولياء الأمور عند وصولهم للمركز","التأكد من تسجيل حضور المراجع","توجيه المراجع إلى العيادة الصحيحة","تنظيم حركة المرضى في منطقة الانتظار","التأكد من دخول المرضى إلى العيادات حسب المواعيد","إبلاغ منسق شؤون المرضى في حال تأخر المراجع","إبلاغ المنسق في حال تأخر العيادة","الرد على استفسارات المراجعين داخل المركز","الرد على المكالمات الهاتفية","استقبال طلبات تعديل المواعيد","تنظيم ملفات المراجعين","التأكد من تحديث النماذج الخاصة بالمواعيد","مراجعة جاهزية منطقة الاستقبال","متابعة الملاحظات الواردة من المرضى","المساعدة في إعداد الإحصائيات عند الطلب","ترتيب الأرشيف الخاص بالمواعيد","تحديث قوائم الاتصال الخاصة بالمراجعين","استقبال شكاوى المراجعين وتحويلها لمنسق شؤون المرضى","مساعدة المرضى الجدد في التعرف على خدمات المركز","المساعدة في تنظيم العمل عند ازدحام المراجعين"]
    };
    const defaultEmployees = [
      { name: "ماجد الصفحي", role: "المنسق العام لشؤون المرضى والاستقبال" },
      { name: "محمد عسيري", role: "منسق شؤون مرضى" },
      { name: "ابتسام الحربي", role: "منسق شؤون مرضى" },
      { name: "خديجة الشهري", role: "موظف استقبال" },
      { name: "محمد الحربي", role: "موظف استقبال" }
    ];
    const storageKey = 'pmbs-patient-affairs-dashboard-v3';
    const app = document.getElementById('app');
    function slugify(text){ return text.toString().trim().replace(/\s+/g,'-').replace(/[^\u0600-\u06FF\w-]/g,'').toLowerCase(); }
    function createTask(text,isCustom=false){ return { id: Date.now().toString(36)+Math.random().toString(36).slice(2,8), text, status:'new', completedCount:'', note:'', isCustom }; }
    function buildEmployee(name,role){ return { id: slugify(name), name, role, tasks:(roleTasks[role]||[]).map(t=>createTask(t,false)) }; }
    function ensureEmployeeShape(employee){ employee.id=employee.id||slugify(employee.name); employee.tasks=Array.isArray(employee.tasks)?employee.tasks:[]; employee.tasks=employee.tasks.map(task=>({id:task.id||Date.now().toString(36)+Math.random().toString(36).slice(2,8),text:task.text||'',status:task.status||'new',completedCount:task.completedCount ?? '',note:task.note||'',isCustom:!!task.isCustom})); const roleBasedTexts=roleTasks[employee.role]||[]; const existing=new Set(employee.tasks.filter(t=>!t.isCustom).map(t=>t.text)); roleBasedTexts.forEach(text=>{ if(!existing.has(text)) employee.tasks.push(createTask(text,false)); }); return employee; }
    function loadData(){ const saved=localStorage.getItem(storageKey); if(!saved){ const seed=defaultEmployees.map(e=>buildEmployee(e.name,e.role)); localStorage.setItem(storageKey,JSON.stringify(seed)); return seed; } try{ return JSON.parse(saved).map(ensureEmployeeShape); } catch(e){ const seed=defaultEmployees.map(e=>buildEmployee(e.name,e.role)); localStorage.setItem(storageKey,JSON.stringify(seed)); return seed; } }
    let employees = loadData();
    function saveData(){ localStorage.setItem(storageKey, JSON.stringify(employees)); }
    function getEmployeeById(id){ return employees.find(emp=>emp.id===id); }
    function getCounts(tasks){ return tasks.reduce((acc,t)=>{ acc.total++; if(t.status==='done') acc.done++; else if(t.status==='progress') acc.progress++; else if(t.status==='late') acc.late++; else acc.new++; return acc; }, { total:0, done:0, progress:0, late:0, new:0 }); }
    function getGlobalCounts(){ return employees.reduce((acc,emp)=>{ const c=getCounts(emp.tasks); acc.total+=c.total; acc.done+=c.done; acc.progress+=c.progress; acc.late+=c.late; acc.new+=c.new; return acc; }, { total:0, done:0, progress:0, late:0, new:0 }); }
    function getEmployeeLink(employeeId){ const url=new URL(window.location.href); url.searchParams.set('employee', employeeId); return url.toString(); }
    function statusLabel(status){ return ({new:'جديدة',progress:'قيد التنفيذ',done:'تم الإنجاز',late:'متأخرة'})[status] || 'جديدة'; }
    function statusClass(status){ return ({new:'status-new',progress:'status-progress',done:'status-done',late:'status-late'})[status] || 'status-new'; }
    function escapeHtml(value){ return String(value||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function renderDashboard(){ const global=getGlobalCounts(); document.getElementById('heroTitle').textContent='داشبورد شؤون المرضى والاستقبال'; document.getElementById('heroSubtitle').textContent='مركز التوحد - متابعة الإنجاز اليومي للفريق والمؤشرات التشغيلية'; app.innerHTML = `
        <div class="grid stats-grid"><div class="card stat-card"><div class="stat-title">إجمالي المهام</div><div class="stat-value">${global.total}</div></div><div class="card stat-card"><div class="stat-title">المهام المنجزة</div><div class="stat-value">${global.done}</div></div><div class="card stat-card"><div class="stat-title">المهام قيد التنفيذ</div><div class="stat-value">${global.progress}</div></div><div class="card stat-card"><div class="stat-title">المهام المتأخرة</div><div class="stat-value">${global.late}</div></div></div>
        <h2 class="section-title">الفريق</h2><p class="section-subtitle">اضغط على اسم الموظف أو زر فتح الصفحة للانتقال إلى صفحته المستقلة.</p>
        <div class="grid cards-grid">${employees.map(emp=>{ const counts=getCounts(emp.tasks); return `<div class="card employee-card"><a href="${getEmployeeLink(emp.id)}" target="_blank" rel="noopener"><h3>${emp.name}</h3></a><div class="role">${emp.role}</div><div class="pill-row"><span class="pill total">إجمالي: ${counts.total}</span><span class="pill done">منجزة: ${counts.done}</span><span class="pill progress">قيد التنفيذ: ${counts.progress}</span><span class="pill late">متأخرة: ${counts.late}</span></div><div class="toolbar"><a class="btn" href="${getEmployeeLink(emp.id)}" target="_blank" rel="noopener">فتح الصفحة</a></div></div>`; }).join('')}</div>
        <div class="grid two-col"><div class="card"><h2 class="section-title" style="font-size:24px">إضافة موظف جديد</h2><p class="section-subtitle">تتم إضافة الموظف مع مهامه الأساسية تلقائياً حسب المسمى الوظيفي.</p><div class="form-grid"><div><label for="newEmployeeName">اسم الموظف</label><input id="newEmployeeName" type="text" placeholder="الاسم الكامل" /></div><div><label for="newEmployeeRole">المسمى الوظيفي</label><select id="newEmployeeRole"><option value="المنسق العام لشؤون المرضى والاستقبال">المنسق العام لشؤون المرضى والاستقبال</option><option value="منسق شؤون مرضى">منسق شؤون مرضى</option><option value="موظف استقبال">موظف استقبال</option></select></div><div class="full-span toolbar"><button onclick="addEmployee()">إضافة الموظف</button></div></div></div><div class="card"><h2 class="section-title" style="font-size:24px">ملاحظات تشغيلية</h2><div class="muted-box"><div>• جميع الموظفين لديهم مهام أساسية مدخلة مسبقاً حسب الوظيفة.</div><div>• يمكن لكل موظف إضافة مهام جديدة عند الحاجة.</div><div>• يتم حفظ البيانات تلقائياً داخل المتصفح الحالي.</div><div>• عند رفع الملف على Vercel سيبقى الشكل نفسه، وللتحديث الفوري بين الجميع سنربطه لاحقاً بقاعدة بيانات.</div></div></div></div>`; }
    function renderEmployeePage(employeeId){ const employee=getEmployeeById(employeeId); if(!employee){ app.innerHTML='<div class="card empty-state">الموظف غير موجود.</div>'; return; } const counts=getCounts(employee.tasks); document.getElementById('heroTitle').textContent=employee.name; document.getElementById('heroSubtitle').textContent=employee.role; app.innerHTML = `<div class="top-actions"><a class="btn secondary" href="${window.location.pathname}">العودة إلى الداشبورد الرئيسي</a><div class="footer-note">يمكن فتح هذه الصفحة كرابط مستقل لكل موظف.</div></div><div class="card"><div class="employee-header"><div><h2>${employee.name}</h2><p>${employee.role}</p></div><div class="pill-row"><span class="pill total">إجمالي: ${counts.total}</span><span class="pill done">منجزة: ${counts.done}</span><span class="pill progress">قيد التنفيذ: ${counts.progress}</span><span class="pill late">متأخرة: ${counts.late}</span><span class="pill new">جديدة: ${counts.new}</span></div></div><div class="toolbar"><button class="btn secondary" onclick="resetEmployeeStatuses('${employee.id}')">إعادة ضبط حالات اليوم</button></div></div><div class="grid two-col" style="margin-top:18px"><div class="card"><h2 class="section-title" style="font-size:24px">المهام اليومية</h2><p class="section-subtitle">تم إدخال المهام الأساسية مسبقاً، ويمكن تحديث الحالة والملاحظات أو إضافة مهمة جديدة.</p><div class="task-list">${employee.tasks.map(task=>`<div class="task-item"><div class="task-head"><div class="task-title">${task.text}</div><span class="status-badge ${statusClass(task.status)}">${statusLabel(task.status)}</span></div><div class="task-body"><div class="task-fields"><div><label>الحالة</label><select onchange="updateTaskField('${employee.id}','${task.id}','status',this.value)"><option value="new" ${task.status==='new'?'selected':''}>جديدة</option><option value="progress" ${task.status==='progress'?'selected':''}>قيد التنفيذ</option><option value="done" ${task.status==='done'?'selected':''}>تم الإنجاز</option><option value="late" ${task.status==='late'?'selected':''}>متأخرة</option></select></div><div><label>العدد المنجز</label><input type="number" min="0" value="${task.completedCount}" oninput="updateTaskField('${employee.id}','${task.id}','completedCount',this.value)" placeholder="0" /></div><div><label>ملاحظات</label><input type="text" value="${escapeHtml(task.note)}" oninput="updateTaskField('${employee.id}','${task.id}','note',this.value)" placeholder="أضف ملاحظة مختصرة" /></div></div>${task.isCustom ? `<div class="task-actions"><button class="btn danger" onclick="deleteTask('${employee.id}','${task.id}')">حذف المهمة المضافة</button></div>` : `<div class="small-note">مهمة أساسية مرتبطة بالمسمى الوظيفي.</div>`}</div></div>`).join('')}</div></div><div class="card"><h2 class="section-title" style="font-size:24px">إضافة مهمة جديدة</h2><p class="section-subtitle">للمهام الإضافية غير الموجودة ضمن القائمة الأساسية.</p><label for="customTaskText">اسم المهمة</label><textarea id="customTaskText" placeholder="مثال: متابعة الموعد الملغى وإعادة جدولته"></textarea><div class="toolbar" style="margin-top:12px"><button onclick="addCustomTask('${employee.id}')">إضافة المهمة</button></div><div class="muted-box" style="margin-top:18px"><div>• تحديثات هذه الصفحة تحفظ تلقائياً على هذا المتصفح.</div><div>• المهام الأساسية تظهر دائماً تلقائياً حسب الدور.</div><div>• يمكن لاحقاً ربط هذه النسخة بقاعدة بيانات لتصبح التحديثات فورية بين جميع الموظفين.</div></div></div></div>`; }
    function addEmployee(){ const nameInput=document.getElementById('newEmployeeName'); const roleSelect=document.getElementById('newEmployeeRole'); const name=nameInput.value.trim(); const role=roleSelect.value; if(!name){ alert('يرجى إدخال اسم الموظف.'); return; } const id=slugify(name); if(employees.some(e=>e.id===id)){ alert('يوجد موظف بنفس الاسم أو المعرّف.'); return; } employees.push(buildEmployee(name,role)); saveData(); nameInput.value=''; renderDashboard(); }
    function updateTaskField(employeeId,taskId,field,value){ const emp=getEmployeeById(employeeId); if(!emp) return; const task=emp.tasks.find(t=>t.id===taskId); if(!task) return; task[field]=value; saveData(); renderEmployeePage(employeeId); }
    function addCustomTask(employeeId){ const emp=getEmployeeById(employeeId); if(!emp) return; const textarea=document.getElementById('customTaskText'); const text=textarea.value.trim(); if(!text){ alert('يرجى كتابة اسم المهمة.'); return; } emp.tasks.unshift(createTask(text,true)); saveData(); renderEmployeePage(employeeId); }
    function deleteTask(employeeId,taskId){ const emp=getEmployeeById(employeeId); if(!emp) return; emp.tasks=emp.tasks.filter(t=>!(t.id===taskId && t.isCustom)); saveData(); renderEmployeePage(employeeId); }
    function resetEmployeeStatuses(employeeId){ const emp=getEmployeeById(employeeId); if(!emp) return; emp.tasks=emp.tasks.map(t=>({ ...t, status:'new', completedCount:'', note:t.note || '' })); saveData(); renderEmployeePage(employeeId); }
    window.addEmployee=addEmployee; window.updateTaskField=updateTaskField; window.addCustomTask=addCustomTask; window.deleteTask=deleteTask; window.resetEmployeeStatuses=resetEmployeeStatuses;
    function init(){ const employeeId=new URLSearchParams(window.location.search).get('employee'); if(employeeId) renderEmployeePage(employeeId); else renderDashboard(); }
    init();
  </script>
</body>
</html>
